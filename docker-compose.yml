services:
  rustdrop:
    image: ubermetroid/rustdrop:latest
    container_name: rustdrop
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      # Replace "./local_uploads" (before the colon) with the path where the files should land on your host
      - ./uploads:/app/uploads
    environment:
      # Explicitly set upload directory inside the container
      UPLOAD_DIR: /app/uploads
      
      # The site title shown in the web interface
      RUSTDROP_TITLE: RustDrop
      
      # Maximum file size in MB
      MAX_FILE_SIZE: 1024
      
      # Optional PIN protection (4-10 digits, leave empty to disable)
      RUSTDROP_PIN: 123456
      
      # Start uploading immediately upon file selection (true/false)
      AUTO_UPLOAD: "true"
      
      # The base URL for the application (must end with a trailing slash)
      BASE_URL: http://localhost:3000/
      
      # Enable file listing, download, and deletion in the explorer UI (true/false)
      SHOW_FILE_LIST: "true"

      # Additional available environment variables (commented out with defaults)
      # PORT: 3000  # Server port (default: 3000)
      # NODE_ENV: production  # Environment (development/production)
      # APPRISE_URL: ""  # Apprise notification URL (e.g. tgram://bottoken/chatid)
      # APPRISE_MESSAGE: "New file uploaded - {filename} ({size}), Storage used {storage}"  # Message template
      # APPRISE_SIZE_UNIT: "Auto"  # Size formatting unit (B, KB, MB, GB, TB, or Auto)
      # ALLOWED_EXTENSIONS: ".jpg,.jpeg,.png,.pdf,.doc,.docx,.txt"  # Comma-separated list of allowed file extensions

      # Reverse Proxy / Security Settings
      # TRUST_PROXY: "false"  # Set to 'true' ONLY if behind a trusted reverse proxy (Nginx, Cloudflare, etc.)
      # TRUSTED_PROXY_IPS: 172.17.0.1,10.0.0.1  # Optional: Comma-separated list of trusted proxy IPs
